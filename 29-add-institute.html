              <div class="form-group">

                  <option>Operational</option>
                  <option>Non-Operational</option>
                </select>
              </div>

  <script>
    const instituteType = document.getElementById('institute_type');
    const instituteLevel = document.getElementById('institute_level');
    const genderSelect = document.getElementById('gender');
    const peripherySelect = document.getElementById('periphery_area');
    const hardAreaSelect = document.getElementById('hard_area');
    const status = document.getElementById('status');
    const operationalStatus = document.getElementById('operational_status');

    // Store original options
    [
      instituteLevel,
      genderSelect,
      peripherySelect,
      hardAreaSelect,
      operationalStatus
    ].forEach(function (sel) {
      sel.dataset.originalOptions = sel.innerHTML;
    });

    function setNotApplicable(select, disable) {
      if (disable) {
        select.innerHTML = '<option selected>Not Applicable</option>';
        select.disabled = true;
        select.required = false;
      } else {
        select.innerHTML = select.dataset.originalOptions;
        select.disabled = false;
        select.required = true;
        select.selectedIndex = 0;
      }
    }

    // Institute Type Rules
    instituteType.addEventListener('change', function () {

      const value = this.value;

      // Institute Level N/A for Admin Unit & University
      setNotApplicable(
        instituteLevel,
        value === 'Admin Unit' || value === 'University'
      );

      // Gender, Periphery & Hard Area N/A for Admin Unit
      const isAdminUnit = value === 'Admin Unit';

      setNotApplicable(genderSelect, isAdminUnit);
      setNotApplicable(peripherySelect, isAdminUnit);
      setNotApplicable(hardAreaSelect, isAdminUnit);
    });

    // Status Rules
    status.addEventListener('change', function () {

      const isInactive = this.value === 'In-Active';

      // Operational Status N/A when Status = In-Active
      setNotApplicable(operationalStatus, isInactive);

      toggleReason();
    });

    // Reason Logic
    function toggleReason() {

      const statusValue = status.value;
      const operationalValue = operationalStatus.value;

      const section = document.getElementById('reasonSection');
      const reason = document.getElementById('reason');

      const showReason =
        statusValue === 'In-Active' ||
        operationalValue === 'Non-Operational';

      if (showReason) {
        section.style.display = 'block';
        reason.required = true;
      } else {
        section.style.display = 'none';
        reason.required = false;
        reason.value = '';
      }
    }

    operationalStatus.addEventListener('change', toggleReason);

    // CMIS Validation
    document.getElementById('cmis_code').addEventListener('input', function () {
      this.value = this.value.replace(/\D/g, '');
    });

    // Capture Location
    document.getElementById('captureLocationBtn').addEventListener('click', function () {

      if (!navigator.geolocation) {
        alert('Geolocation is not supported by this browser.');
        return;
      }

      const btn = this;

      btn.disabled = true;
      btn.textContent = 'Locating...';

      navigator.geolocation.getCurrentPosition(
        function (pos) {
          document.getElementById('latitude').value =
            pos.coords.latitude.toFixed(6);

          document.getElementById('longitude').value =
            pos.coords.longitude.toFixed(6);

          btn.disabled = false;
          btn.textContent = '📍 Use Current Location';
        },
        function () {
          alert('Unable to retrieve location. Please enter coordinates manually.');
          btn.disabled = false;
          btn.textContent = '📍 Use Current Location';
        }
      );
    });

    // Form Validation
    document.getElementById('instituteForm').addEventListener('submit', function (e) {

      const cmis = document.getElementById('cmis_code').value;

      if (cmis.length !== 6) {
        e.preventDefault();
        alert('CMIS Code must be exactly 6 digits.');
      }
    });
  </script>
